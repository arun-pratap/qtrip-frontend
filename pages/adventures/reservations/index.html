<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyTrip Dynamic</title>
    <link rel="stylesheet" href="../../../css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../../css/style.css" />
    <!-- <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    /> -->
  </head>
  <body>
    <!-- Header -->
    <nav
      class="navbar navbar-expand-lg py-2"
      style="background-color: #e3f2fd"
      data-bs-theme="lights"
    >
      <div class="container">
        <a class="navbar-brand fs-4 fw-semibold" href="../../../"> MyTrip Dynamic </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 fw-semibold">
            <li class="nav-item">
              <a class="nav-link" href="../../../">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="../reservations/">Reservations</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-5 d-none" id="mytrip-no-reservation-message">
      <button class="btn p-3 w-100 text-start bg-secondary-subtle">
        Oops! You have not made any reservations yet! (Click
        <a href="../../../"><strong>here</strong></a> to explore some cities)
      </button>
    </div>
    <div class="container py-4 d-none" id="mytrip-reservation-detail">
      <h1 class="my-4">Your Reservations</h1>
      <div class="table-responsive">
        <table class="table table-hover" id="mytrip-reservation-table">
          <thead>
            <tr>
              <th>Transaction ID</th>
              <th>Booking Name</th>
              <th>Adventure</th>
              <th>Person(s)</th>
              <th>Date</th>
              <th>Price</th>

              <th>Booking Time</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="mytrip-reservation-table-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Footer -->
    <footer class="bg-light py-3 text-center text-muted">
      <div class="container">
        <span>&copy; 2026 MyTrip Dynamic. All rights reserved.</span>
      </div>
    </footer>

    <script type="module">
      import {
        fetchReservations,
        addReservationsToDOM,
      } from "../../../modules/reservation.js";

      async function init() {
        const reservations = await fetchReservations();
        addReservationsToDOM(reservations);
      }
      init();
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
