    <script type="module">
      import {
        getQueryParamFromURL,
        fetchAdventures,
        // filterByDuration,
        // filterByCategory,
        applyFilters,
        addAdventuresToDOM,
        addCategoryToFiltersAndDOM,
      } from "../../modules/adventures.js";

      // Todo:
      // 1. Get query params from URL
      // 2. Use API to get the data
      // 3. Set filters to local storage ( get filters from loclstorage if presnt get it from local storge or intill feeed its iinitial value)

      let filters = JSON.parse(window.localStorage.getItem("filters")) || {
        duration: "",
        category: [],
      };
      let adventures;
      async function init() {
        const city = getQueryParamFromURL("city");
        adventures = await fetchAdventures(city);
        addAdventuresToDOM(applyFilters(filters, adventures));
        addCategoryToFiltersAndDOM(filters);
      }
      init();

      function handleSelectDuration(event) {
        console.log(event.target.value);
        filters.duration = event.target.value;

        let filteredAdventures = applyFilters(filters, adventures);
        addAdventuresToDOM(filteredAdventures);
        window.localStorage.setItem("filters", JSON.stringify(filters));
      }

      function handleAddCategory(event) {
        // console.log(event.target.value);

        let value = event.target.value;

        // this works because, if any element repeats again then indexof doesnt return that prtiular index, insteaad it will return first occurence

        if (filters.category.indexOf(value) === -1) {
          filters.category.push(event.target.value);

          addAdventuresToDOM(applyFilters(filters, adventures));

          addCategoryToFiltersAndDOM(filters);
        }
        event.target.selectedIndex = 0;

        window.localStorage.setItem("filters", JSON.stringify(filters));
      }

      function removeCategory(event) {
        if (event.target.textContent === "x") {
          let parentElement = event.target.parentElement;
          let parentElementId = parentElement.id;

          console.log(parentElementId);
          parentElement.remove();
          let updatedCategory = filters.category.filter(
            (item) => item.toLowerCase() !== parentElementId.split("-")[2],
          );
          filters.category = updatedCategory;
          addAdventuresToDOM(applyFilters(filters, adventures));
          console.log(updatedCategory);
          window.localStorage.setItem("filters", JSON.stringify(filters));
        }
      }

      function resetCategory(event) {
        filters.category = [];
        addAdventuresToDOM(applyFilters(filters, adventures));
        addCategoryToFiltersAndDOM(filters);
        window.localStorage.setItem("filters", JSON.stringify(filters));
      }

      function resetDuration(filtersFromLocalStorage) {
        filters.duration = "";
        document.getElementById("select-duration").selectedIndex = 0;
        console.log(document.getElementById("select-duration").selectedIndex);
        addAdventuresToDOM(applyFilters(filters, adventures));
        window.localStorage.setItem("filters", JSON.stringify(filters));
      }

      const selectDurationElement = document.getElementById("select-duration");
      selectDurationElement.addEventListener("change", handleSelectDuration);

      const resetDurationElement = document.getElementById(
        "mytrip-reset-duration",
      );
      resetDurationElement.addEventListener("click", resetDuration);

      const addCategoryElement = document.getElementById("add-category");
      addCategoryElement.addEventListener("change", handleAddCategory);

      const resetCategoryElement = document.getElementById(
        "mytrip-reset-category",
      );
      resetCategoryElement.addEventListener("click", resetCategory);

      const categoryPills = document.getElementById("mytrip-category-pills");
      categoryPills.addEventListener("click", removeCategory);

      // window.handleSelectDuration = handleSelectDuration;
    </script>
